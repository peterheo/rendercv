cv:
  name: "Peter Heo"
  headline: "Senior Software Engineer"
  email: "peterheo16@gmail.com"
  phone: "+15714491168"
  sections:
    summary:
      - Senior Software Engineer with 7+ years of experience specializing in
        cloud security, infrastructure automation, and policy enforcement at
        enterprise scale. Combines deep technical expertise in Python, OPA, and
        AWS with hands-on engineering leadership — from architecting compliance
        frameworks to mentoring teams and driving adoption across large
        organizations
    experience:
      - company: "Capital One"
        position: "Senior Software Engineer"
        start_date: "2021-11"
        end_date: "present"
        highlights:
          - title: "OnePipeline (Internal Infrastructure Platform – Python, Terraform):"
            body:
              - "Integrated 13 enterprise-wide infrastructure platforms with CloudPre enabling secure, standardized provisioning of AWS resources, and ensuring compliance with organizational security controls"
              - "Gathered and operationalized stakeholder and customer feedback to eliminate key platform friction points, driving increased adoption and faster rollout of high-priority infrastructure features"
          - title: "CloudPre (Pre-Deployment Compliance Platform – Python, OPA Rego):"
            body:
              - "Led a team of 5 engineers, owning roadmap, architecture, and delivery of a company-wide policy enforcement platform securing AWS infrastructure at scale"
              - "Architected and implemented a policy enforcement framework using Python and OPA, enforcing 300+ preventive controls across 68 AWS services"
              - "Reduced security violations in AWS environments by 98% over 3 years by shifting compliance left through automated pre-deployment enforcement"
              - "Built an LLM-powered policy development workflow to automate policy design, validation, and deployment, significantly reducing time to roll out new security controls"
              - "Mentored junior engineers and established code review standards, driving improvements in code quality, system reliability, and team velocity"
      - company: "Verisign"
        position: "Software Engineer"
        start_date: "2018-07"
        end_date: "2021-11"
        highlights:
          - title: "RecDNS Firewall (Client-Facing DNS Security Web Application – Python):"
            body:
            - "Built UI features and backend APIs for a client-facing DNS security platform at one of the world's largest DNS infrastructure providers, enabling enterprise clients to configure and manage recursive DNS filtering"
          - title: "WebWhois (Domain Lookup Web Application – Java):"
            body:
            - "Modernized a legacy Java/JSP domain lookup application by containerizing components with Docker, improving deployment consistency and reducing environment-related issues"
    skills:
      - label: "Languages"
        details: "Python, Java, OPA Rego"
      - label: "Tools"
        details: "AWS, Terraform, Docker, Jenkins, Claude Code"
    education:
      - institution: "George Mason University"
        area: "Computer Science"
        degree: "BS"
        start_date: "2014-08"
        end_date: "2018-05"
design:
  theme: engineeringclassic
  page:
    size: us-letter
    top_margin: 0.7in
    bottom_margin: 0.7in
    left_margin: 0.7in
    right_margin: 0.7in
    show_footer: true
    show_top_note: true
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 79, 144)
    headline: rgb(0, 79, 144)
    connections: rgb(0, 79, 144)
    section_titles: rgb(0, 79, 144)
    links: rgb(0, 79, 144)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  typography:
    line_spacing: 0.6em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: Raleway
      name: Raleway
      headline: Raleway
      connections: Raleway
      section_titles: Raleway
    font_size:
      body: 10pt
      name: 30pt
      headline: 10pt
      connections: 10pt
      section_titles: 1.4em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: false
      headline: false
      connections: false
      section_titles: false
  links:
    underline: false
    show_external_link_icon: false
  header:
    alignment: left
    photo_width: 3.5cm
    photo_position: left
    photo_space_left: 0.4cm
    photo_space_right: 0.4cm
    space_below_name: 0.7cm
    space_below_headline: 0.7cm
    space_below_connections: 0.7cm
    connections:
      phone_number_format: national
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: false
      separator: ''
      space_between_connections: 0.5cm
  section_titles:
    type: with_full_line
    line_thickness: 0.5pt
    space_above: 0.5cm
    space_below: 0.3cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 1.2em
    space_between_text_based_entries: 0.3em
    show_time_spans_in: []
  entries:
    date_and_location_width: 4.15cm
    side_space: 0.2cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: false
    degree_width: 1cm
    summary:
      space_above: 0.12cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: •
      space_left: 0cm
      space_above: 0.12cm
      space_between_items: 0.12cm
      space_between_bullet_and_text: 0.5em
  templates:
    footer: '*NAME -- PAGE_NUMBER/TOTAL_PAGES*'
    top_note: '*LAST_UPDATED CURRENT_DATE*'
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: '**LABEL:** DETAILS'
    education_entry:
      main_column: |-
        **INSTITUTION**, DEGREE_WITH_AREA -- LOCATION
        SUMMARY
        HIGHLIGHTS
      degree_column:
      date_and_location_column: DATE
    normal_entry:
      main_column: |-
        **NAME** -- **LOCATION**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    experience_entry:
      main_column: |-
        **POSITION**, COMPANY -- LOCATION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    publication_entry:
      main_column: |-
        **TITLE**
        SUMMARY
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
